# Reusable phase-1 release workflow for plugins distributed through this
# marketplace: keep a standing release PR up to date on every push to main.
# Nothing releases until a human squash-merges that PR â€” then
# plugin-tag-release.yml takes over.
#
# Plugin repos call it on pushes to their default branch, pinned to a commit
# SHA of this repo (never @main â€” bump the pin deliberately, or let
# Dependabot do it):
#
#   name: Prepare release
#   on:
#     push:
#       branches: [main]
#   jobs:
#     prepare:
#       uses: gwenneg/claude-ichiba/.github/workflows/plugin-prepare-release.yml@<sha> # <version/date>
#       permissions:
#         contents: write
#         pull-requests: write
#
# On every push it computes the next version (latest v* tag + bump derived
# from the conventional commits since it), force-recreates the release/next
# branch from HEAD, commits the version into .claude-plugin/plugin.json
# there (through the Contents API, so the commit is GitHub-signed), and
# opens or refreshes the release PR with the changelog.
#
# The repo must allow Actions to create pull requests (Settings â†’ Actions â†’
# General â†’ "Allow GitHub Actions to create and approve pull requests").

name: Plugin prepare release

on:
  workflow_call:

jobs:
  prepare:
    # Skip the push produced by squash-merging the release PR itself.
    if: "!startsWith(github.event.head_commit.message, 'release:')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so all v* tags are visible

      - id: next-version
        name: Compute next version from the previous tag
        run: |
          PREVIOUS_TAG=$(git tag --list 'v*' | sort -V | tail -1)

          # An untagged manifest version means a release merge is in flight
          # (belt and braces â€” the job guard misses non-squash merges).
          MANIFEST_VERSION=$(jq -r '.version // empty' .claude-plugin/plugin.json)
          if [ -n "$MANIFEST_VERSION" ] && [ "v$MANIFEST_VERSION" != "$PREVIOUS_TAG" ]; then
            echo "Release v$MANIFEST_VERSION is in flight â€” skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git log --pretty=format:'%s' "${PREVIOUS_TAG:+$PREVIOUS_TAG..}HEAD")
          if [ -z "$COMMITS" ]; then
            echo "No commits since ${PREVIOUS_TAG:-the beginning} â€” skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conventional commits decide the bump: a '!' breaking marker
          # anywhere before the colon â†’ major, any feat: â†’ minor, else patch.
          BUMP="patch"
          while IFS= read -r msg; do
            case "$msg" in
              *'!'*:*) BUMP="major"; break ;;
              feat:*) BUMP="minor" ;;
            esac
          done <<< "$COMMITS"

          PREVIOUS_VERSION="${PREVIOUS_TAG#v}"
          PREVIOUS_VERSION="${PREVIOUS_VERSION:-0.0.0}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$PREVIOUS_VERSION"
          case "$BUMP" in
            major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEXT_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac
          {
            echo "skip=false"
            echo "version=$NEXT_VERSION"
            echo "bump=$BUMP"
            echo "changelog<<EOF"
            git log --pretty=tformat:'- %s' "${PREVIOUS_TAG:+$PREVIOUS_TAG..}HEAD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update release branch
        if: steps.next-version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next-version.outputs.version }}
        run: |
          MANIFEST=.claude-plugin/plugin.json
          BRANCH=release/next
          CONTENT=$(jq --arg v "$VERSION" '.version = $v' "$MANIFEST" | base64 -w 0)

          # Recreate the branch from HEAD so it can never conflict with main.
          if gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH" --silent 2>/dev/null; then
            gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH" \
              --method PATCH -f "sha=$(git rev-parse HEAD)" -F "force=true"
          else
            gh api "repos/$GITHUB_REPOSITORY/git/refs" \
              --method POST -f "ref=refs/heads/$BRANCH" -f "sha=$(git rev-parse HEAD)"
          fi

          # Commit via the Contents API â€” GitHub signs it automatically.
          gh api "repos/$GITHUB_REPOSITORY/contents/$MANIFEST" \
            --method PUT \
            -f "message=release: v$VERSION" \
            -f "content=$CONTENT" \
            -f "sha=$(git rev-parse "HEAD:$MANIFEST")" \
            -f "branch=$BRANCH" > /dev/null

      - name: Open or update the release PR
        if: steps.next-version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next-version.outputs.version }}
          BUMP: ${{ steps.next-version.outputs.bump }}
          CHANGELOG: ${{ steps.next-version.outputs.changelog }}
        run: |
          TITLE="release: v$VERSION"
          {
            printf '## v%s (%s bump)\n\n' "$VERSION" "$BUMP"
            printf '%s\n' "$CHANGELOG"
            printf '\n---\nSquash-merge to release v%s. This PR refreshes on every push to main.\n' "$VERSION"
          } > /tmp/pr-body.md
          EXISTING=$(gh pr list --head release/next --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "$TITLE" --body-file /tmp/pr-body.md
          else
            gh pr create --title "$TITLE" --body-file /tmp/pr-body.md \
              --base "${GITHUB_REF#refs/heads/}" --head release/next
          fi
