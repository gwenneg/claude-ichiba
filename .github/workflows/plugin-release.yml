# Reusable release workflow for plugins distributed through this marketplace.
#
# Plugin repos call it on annotated v* tags, pinned to a commit SHA of this
# repo (never @main — bump the pin deliberately, or let Dependabot do it):
#
#   name: Release
#   on:
#     push:
#       tags: ['v*']
#   jobs:
#     release:
#       uses: gwenneg/claude-ichiba/.github/workflows/plugin-release.yml@<sha> # <version/date>
#       permissions:
#         contents: write
#       secrets:
#         ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
#
# It validates that the pushed tag is annotated, creates the GitHub release
# in the calling repo, and dispatches the release URL back here, where
# update-marketplace.yml opens the marketplace PR.

name: Plugin release

on:
  workflow_call:
    secrets:
      ICHIBA_PAT:
        description: Token allowed to send repository_dispatch to gwenneg/claude-ichiba
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - id: tag
        name: Validate and extract tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Only annotated tags are supported — lightweight tags provide no signing guarantee.
          TYPE=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq '.object.type')
          if [ "$TYPE" != "tag" ]; then
            echo "Error: $TAG is not an annotated tag (type='$TYPE')"
            exit 1
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - id: create-release
        name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          URL=$(gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Dispatch to claude-ichiba
        env:
          ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
          RELEASE: ${{ steps.create-release.outputs.url }}
        run: |
          # Dispatch the full release URL — claude-ichiba resolves the plugin name, tag, and SHA from it.
          curl -fsSL -X POST \
            -H "Authorization: token $ICHIBA_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/gwenneg/claude-ichiba/dispatches" \
            -d "$(jq -n --arg release "$RELEASE" '{event_type: "plugin-release", client_payload: {release: $release}}')"
