# Reusable release workflow for plugins distributed through this marketplace.
#
# Plugin repos call it on every push to their default branch, pinned to a
# commit SHA of this repo (never @main — bump the pin deliberately, or let
# Dependabot do it):
#
#   name: Release
#   on:
#     push:
#       branches: [main]
#   jobs:
#     release:
#       uses: gwenneg/claude-ichiba/.github/workflows/plugin-release.yml@<sha> # <version/date>
#       permissions:
#         contents: write
#         pull-requests: write
#       secrets:
#         ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
#
# Each push is classified by comparing plugin.json's version to the existing
# v* tags. The only thing that changes that version is a release PR merging,
# so an untagged manifest version identifies the release merge — and makes a
# failed release retry on the next push:
#
# - Versions agree → prepare: compute the next version from the conventional
#   commits since the last tag, force-recreate release/next from HEAD, commit
#   the version into plugin.json there (Contents API — GitHub-signed), and
#   open or refresh the standing release PR with the changelog. Merging that
#   PR is the release decision.
# - Manifest version untagged → release: create the annotated tag on the
#   commit that changed plugin.json, publish the GitHub release, and dispatch
#   back here, where update-marketplace.yml opens the marketplace PR.
#
# The repo must allow Actions to create pull requests (Settings → Actions →
# General → "Allow GitHub Actions to create and approve pull requests").

name: Plugin release

on:
  workflow_call:
    secrets:
      ICHIBA_PAT:
        description: Token allowed to send repository_dispatch to gwenneg/claude-ichiba
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so all v* tags are visible

      - id: mode
        name: Classify the push — release merge or regular commit
        run: |
          MANIFEST_VERSION=$(jq -r '.version // empty' .claude-plugin/plugin.json)
          if [ -n "$MANIFEST_VERSION" ] && ! git rev-parse -q --verify "refs/tags/v$MANIFEST_VERSION" > /dev/null; then
            echo "Manifest version $MANIFEST_VERSION is untagged — releasing it"
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "mode=prepare" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and publish the release
        if: steps.mode.outputs.mode == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
          VERSION: ${{ steps.mode.outputs.version }}
        run: |
          TAG="v$VERSION"

          # A racing run may have finished the release since classification.
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --silent 2>/dev/null; then
            echo "$TAG already exists — nothing left to do"
            exit 0
          fi

          # Tag the commit that changed the manifest, not HEAD — a commit
          # pushed right behind the release merge must not be swept in.
          COMMIT=$(git log -1 --format=%H -- .claude-plugin/plugin.json)

          # Annotated (not lightweight) — update-marketplace.yml dereferences the tag object.
          TAG_OBJ=$(gh api "repos/$GITHUB_REPOSITORY/git/tags" \
            --method POST \
            -f "tag=$TAG" -f "message=$TAG" -f "object=$COMMIT" -f "type=commit" \
            --jq '.sha')
          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            --method POST -f "ref=refs/tags/$TAG" -f "sha=$TAG_OBJ"

          RELEASE=$(gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes)

          # Dispatch the full release URL — claude-ichiba resolves the plugin name, tag, and SHA from it.
          curl -fsSL -X POST \
            -H "Authorization: token $ICHIBA_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/gwenneg/claude-ichiba/dispatches" \
            -d "$(jq -n --arg release "$RELEASE" '{event_type: "plugin-release", client_payload: {release: $release}}')"

      - id: next-version
        name: Compute next version from the previous tag
        if: steps.mode.outputs.mode == 'prepare'
        run: |
          PREVIOUS_TAG=$(git tag --list 'v*' | sort -V | tail -1)
          COMMITS=$(git log --pretty=format:'%s' "${PREVIOUS_TAG:+$PREVIOUS_TAG..}HEAD")
          if [ -z "$COMMITS" ]; then
            echo "No commits since ${PREVIOUS_TAG:-the beginning} — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conventional commits decide the bump: a '!' breaking marker
          # anywhere before the colon → major, any feat: → minor, else patch.
          BUMP="patch"
          while IFS= read -r msg; do
            case "$msg" in
              *'!'*:*) BUMP="major"; break ;;
              feat:*) BUMP="minor" ;;
            esac
          done <<< "$COMMITS"

          PREVIOUS_VERSION="${PREVIOUS_TAG#v}"
          PREVIOUS_VERSION="${PREVIOUS_VERSION:-0.0.0}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$PREVIOUS_VERSION"
          case "$BUMP" in
            major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEXT_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac
          {
            echo "skip=false"
            echo "version=$NEXT_VERSION"
            echo "bump=$BUMP"
            echo "changelog<<EOF"
            git log --pretty=tformat:'- %s' "${PREVIOUS_TAG:+$PREVIOUS_TAG..}HEAD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update release branch
        if: steps.mode.outputs.mode == 'prepare' && steps.next-version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next-version.outputs.version }}
        run: |
          MANIFEST=.claude-plugin/plugin.json
          BRANCH=release/next
          CONTENT=$(jq --arg v "$VERSION" '.version = $v' "$MANIFEST" | base64 -w 0)

          # Recreate the branch from HEAD so it can never conflict with main.
          if gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH" --silent 2>/dev/null; then
            gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH" \
              --method PATCH -f "sha=$(git rev-parse HEAD)" -F "force=true"
          else
            gh api "repos/$GITHUB_REPOSITORY/git/refs" \
              --method POST -f "ref=refs/heads/$BRANCH" -f "sha=$(git rev-parse HEAD)"
          fi

          # Commit via the Contents API — GitHub signs it automatically.
          gh api "repos/$GITHUB_REPOSITORY/contents/$MANIFEST" \
            --method PUT \
            -f "message=release: v$VERSION" \
            -f "content=$CONTENT" \
            -f "sha=$(git rev-parse "HEAD:$MANIFEST")" \
            -f "branch=$BRANCH" > /dev/null

      - name: Open or update the release PR
        if: steps.mode.outputs.mode == 'prepare' && steps.next-version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next-version.outputs.version }}
          BUMP: ${{ steps.next-version.outputs.bump }}
          CHANGELOG: ${{ steps.next-version.outputs.changelog }}
        run: |
          TITLE="release: v$VERSION"
          {
            printf '## v%s (%s bump)\n\n' "$VERSION" "$BUMP"
            printf '%s\n' "$CHANGELOG"
            printf '\n---\nMerge to release v%s. This PR refreshes on every push to main.\n' "$VERSION"
          } > /tmp/pr-body.md
          EXISTING=$(gh pr list --head release/next --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "$TITLE" --body-file /tmp/pr-body.md
          else
            gh pr create --title "$TITLE" --body-file /tmp/pr-body.md \
              --base "${GITHUB_REF#refs/heads/}" --head release/next
          fi
