# Reusable phase-2 release workflow: turn the merge of the standing release
# PR (maintained by plugin-prepare-release.yml) into an actual release.
#
# Plugin repos call it when pull requests close on their default branch,
# pinned to a commit SHA of this repo (never @main — bump the pin
# deliberately, or let Dependabot do it):
#
#   name: Create release
#   on:
#     pull_request:
#       types: [closed]
#       branches: [main]
#   jobs:
#     release:
#       uses: gwenneg/claude-ichiba/.github/workflows/plugin-tag-release.yml@<sha> # <version/date>
#       permissions:
#         contents: write
#       secrets:
#         ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
#
# It reads the released version from plugin.json at the merge commit,
# creates the annotated tag there — the released tree carries its own
# version by construction — publishes the GitHub release, and dispatches
# the release URL back here, where update-marketplace.yml opens the
# marketplace PR.

name: Plugin tag release

on:
  workflow_call:
    secrets:
      ICHIBA_PAT:
        description: Token allowed to send repository_dispatch to gwenneg/claude-ichiba
        required: true

jobs:
  release:
    # Only the merge of the standing release PR counts.
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'release/next'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - id: released-version
        name: Read the released version from the merge commit
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          VERSION=$(gh api "repos/$GITHUB_REPOSITORY/contents/.claude-plugin/plugin.json?ref=$MERGE_SHA" \
            --jq '.content' | base64 -d | jq -r '.version // empty')
          if [ -z "$VERSION" ]; then
            echo "Error: no version in plugin.json at $MERGE_SHA"
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/v$VERSION" --silent 2>/dev/null; then
            echo "Error: tag v$VERSION already exists"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag on the merge commit
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.released-version.outputs.version }}
          COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          # Annotated (not lightweight) — update-marketplace.yml dereferences the tag object.
          TAG_OBJ=$(gh api "repos/$GITHUB_REPOSITORY/git/tags" \
            --method POST \
            -f "tag=$TAG" -f "message=$TAG" -f "object=$COMMIT" -f "type=commit" \
            --jq '.sha')
          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            --method POST -f "ref=refs/tags/$TAG" -f "sha=$TAG_OBJ"

      - id: create-release
        name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.released-version.outputs.version }}
        run: |
          URL=$(gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Dispatch to claude-ichiba
        env:
          ICHIBA_PAT: ${{ secrets.ICHIBA_PAT }}
          RELEASE: ${{ steps.create-release.outputs.url }}
        run: |
          # Dispatch the full release URL — claude-ichiba resolves the plugin name, tag, and SHA from it.
          curl -fsSL -X POST \
            -H "Authorization: token $ICHIBA_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/gwenneg/claude-ichiba/dispatches" \
            -d "$(jq -n --arg release "$RELEASE" '{event_type: "plugin-release", client_payload: {release: $release}}')"
